# Prévia Open Graph (WhatsApp / redes) para /{slug}/link-cadastro
#
# Requer map no http {} (fora do server {}), se ainda não existir:
#
# map $http_user_agent $is_social_crawler {
#   default 0;
#   ~*(WhatsApp|facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|TelegramBot) 1;
# }
#
# Dentro do server {} do site (ajuste proxy_pass para a API):

location ~ ^/([a-z0-9-]+)/link-cadastro/?$ {
  if ($is_social_crawler) {
    rewrite ^ /og/link-cadastro/$1 break;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  try_files $uri $uri/ /index.html;
}

# Imagens OG ficam em public/og/ do front (ex.: /og/delegada-karen.jpg).
