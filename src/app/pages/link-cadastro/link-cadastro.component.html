<section class="card">
  <h1>Cadastro Rápido</h1>
  <p class="subtitulo">Preencha os dados para concluir seu cadastro.</p>

  <label>Nome completo <input [(ngModel)]="form.nome" /></label>
  <label>Data de nascimento <input type="date" [(ngModel)]="form.data_nascimento" /></label>
  <label>E-mail <input type="email" [(ngModel)]="form.email" /></label>
  <label>WhatsApp <input [(ngModel)]="form.whatsapp" (ngModelChange)="aplicarMascaraWhatsapp()" /></label>
  <label>Instagram <input [(ngModel)]="form.instagram" /></label>
  <label>Indicação <input [(ngModel)]="form.indicacao" /></label>

  <p class="cep-help">
    Para descobrir o seu CEP,
    <a href="https://buscacepinter.correios.com.br/app/endereco/index.php" target="_blank" rel="noopener noreferrer">
      clique aqui!
    </a>
  </p>

  <div class="grid bloco-cep">
    <label>CEP <input [(ngModel)]="form.endereco!.cep" (ngModelChange)="aplicarMascaraCep()" (blur)="buscarCep()" /></label>
    <label>Número <input [(ngModel)]="form.endereco!.numero" /></label>
  </div>

  <label>Logradouro <input [(ngModel)]="form.endereco!.logradouro" /></label>
  <label>Complemento <input [(ngModel)]="form.endereco!.complemento" /></label>

  <div class="grid">
    <label>
      Bairro
      <select [(ngModel)]="form.endereco!.bairro">
        <option [ngValue]="null">Selecione um bairro</option>
        <option *ngIf="bairroDetectadoCep" [value]="bairroDetectadoCep">{{ bairroDetectadoCep }}</option>
        <option *ngFor="let bairro of bairrosDistritoFederal" [value]="bairro">{{ bairro }}</option>
      </select>
    </label>
    <label>Cidade <input [(ngModel)]="form.endereco!.cidade" /></label>
  </div>

  <div class="grid">
    <label>UF <input [(ngModel)]="form.endereco!.uf" /></label>
  </div>

  <div class="consentimento-box">
    <p class="consentimento-titulo">Termo de consentimento (LGPD)</p>
    <p class="consentimento-texto">
      Antes de concluir seu cadastro, leia nosso termo de consentimento.
      <a routerLink="../termo-consentimento">Ler termo completo</a>.
    </p>
    <p class="consentimento-versao"></p>
    <label class="consentimento-check">
      <input type="checkbox" [(ngModel)]="concordaTermo" />
      <span>Li e concordo com o termo de consentimento.</span>
    </label>
  </div>

  <p class="msg erro" *ngIf="erro">{{ erro }}</p>
  <p class="msg sucesso" *ngIf="sucesso">{{ sucesso }}</p>

  <button type="button" [disabled]="salvando" (click)="salvar()">
    {{ salvando ? 'Enviando...' : 'Finalizar cadastro' }}
  </button>
</section>
